name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      # docs 사이트 자체가 바뀔 때만 Pages 배포 (코어 변경은 CI 만, docs 무변경
      # 시 publish 안 함 — zts/.github/workflows/docs.yml 패턴 미러).
      - "website/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # GitHub Pages 공식 권장 — 진행 중 deploy 는 끝까지 보장(연속 commit 시
  # 모두 취소되어 아무 것도 publish 안 되는 패턴 방지).
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd website && bun install --frozen-lockfile

      - name: Build docs (Astro Starlight)
        run: cd website && bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
