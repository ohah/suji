name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '24.14.1'
  # ci.yml 과 동일 — specta-macros rc.25(edition2024+let-chains+
  # extract_if) 로컬 실증치 1.93.0.
  RUST_TOOLCHAIN: '1.93.0'
  GO_VERSION: '1.26.0'
  CEF_PLATFORM: 'macos-arm64'
  CEF_FILE: 'cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_macosarm64_minimal.tar.bz2'

jobs:
  e2e:
    # macOS only — Linux/Windows는 GUI runner 부재 + frameless drag region 등 미지원.
    runs-on: macos-14
    # CI grace period — flaky 한 동안 빌드 자체는 통과시킴.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download CEF
        run: |
          mkdir -p ~/.suji/cef/${{ env.CEF_PLATFORM }}/Release
          mkdir -p ~/.suji/cef/${{ env.CEF_PLATFORM }}/Resources/locales
          mkdir -p ~/.suji/cef/cache
          curl -fSL "https://cef-builds.spotifycdn.com/${{ env.CEF_FILE }}" -o /tmp/cef.tar.bz2
          tar xjf /tmp/cef.tar.bz2 -C /tmp
          CEF_DIR=$(ls -d /tmp/cef_binary_* | head -1)
          cp -R "$CEF_DIR/include" ~/.suji/cef/${{ env.CEF_PLATFORM }}/
          cp -R "$CEF_DIR/Release/"* ~/.suji/cef/${{ env.CEF_PLATFORM }}/Release/ || true
          cp -R "$CEF_DIR/Resources/"* ~/.suji/cef/${{ env.CEF_PLATFORM }}/Resources/ || true

      - name: Download libnode
        run: |
          NODE_DIR="$HOME/.suji/node/${{ env.NODE_VERSION }}"
          mkdir -p "$NODE_DIR"
          ASSET="libnode-${{ env.NODE_VERSION }}-macos-arm64.tar.gz"
          URL="https://github.com/ohah/suji/releases/download/libnode-v${{ env.NODE_VERSION }}/$ASSET"
          curl -fSL "$URL" -o /tmp/libnode.tar.gz
          tar xzf /tmp/libnode.tar.gz -C "$NODE_DIR"
          # release tar에 libnode.dylib만 있고 versioned symlink 누락 — suji 바이너리는
          # @rpath/libnode.137.dylib을 찾으므로 install_name 매칭용 symlink 생성.
          ln -sf libnode.dylib "$NODE_DIR/libnode.137.dylib"
          echo "libnode installed: $NODE_DIR"
          ls -la "$NODE_DIR" | head

      - name: Build suji
        run: zig build

      - name: Install root e2e dependencies (puppeteer-core)
        run: bun install

      - name: Install frontend dependencies
        working-directory: examples/multi-backend/frontend
        run: bun install

      # 첫 단계: 가벼운 fs e2e만. 안정화되면 더 추가.
      - name: E2E — fs
        run: bash tests/e2e/run-fs.sh

      - name: E2E — global shortcut
        run: bash tests/e2e/run-global-shortcut.sh

      - name: E2E — window lifecycle events
        run: bash tests/e2e/run-window-lifecycle-events.sh

      - name: E2E — CEF Views window lifecycle/options
        run: bash tests/e2e/run-window-lifecycle-cef-views.sh

      - name: E2E — CEF Views window lifecycle events
        run: bash tests/e2e/run-window-lifecycle-events-cef-views.sh

      - name: E2E — CEF Views WebContentsView lifecycle
        env:
          SUJI_LOG: ${{ runner.temp }}/suji-e2e-view-lifecycle-cef-views.log
        run: bash tests/e2e/run-view-lifecycle-cef-views.sh

      - name: Upload suji logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: suji-e2e-logs
          path: |
            /tmp/suji-e2e-*.log
            ${{ runner.temp }}/suji-e2e-*.log
            ~/Library/Application Support/Multi Backend Example/Cache/debug.log
          if-no-files-found: ignore

  webcontentsview-cross-platform:
    name: WebContentsView runtime E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cef_platform: linux-x86_64
            cef_file: "cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_linux64_minimal.tar.bz2"
            node_platform: linux-x86_64
          - os: windows-latest
            cef_platform: windows-x86_64
            cef_file: "cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_windows64_minimal.tar.bz2"
            node_platform: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb dbus-x11 fonts-liberation \
            libgtk-3-dev libx11-dev libnss3 libatk-bridge2.0-0 \
            libdrm2 libgbm1 libasound2t64 libxcomposite1 libxdamage1 \
            libxrandr2 libxss1 libxtst6 \
            libx11-xcb1 libxkbcommon-x11-0 libxcb1 libxcb-cursor0 \
            libxcb-dri3-0 libxcb-keysyms1 libxcb-randr0 libxcb-render0 \
            libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-xfixes0 \
            libegl1 libgles2 libgl1 libgl1-mesa-dri libdbus-1-3 \
            libatk1.0-0 libcairo2 libcups2t64 libpango-1.0-0

      - name: Download CEF (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.suji/cef/${{ matrix.cef_platform }}/Release
          mkdir -p ~/.suji/cef/${{ matrix.cef_platform }}/Resources/locales
          mkdir -p ~/.suji/cef/cache
          curl -fSL "https://cef-builds.spotifycdn.com/${{ matrix.cef_file }}" -o /tmp/cef.tar.bz2
          tar xjf /tmp/cef.tar.bz2 -C /tmp
          CEF_DIR=$(ls -d /tmp/cef_binary_* | head -1)
          cp -R "$CEF_DIR/include" ~/.suji/cef/${{ matrix.cef_platform }}/
          cp -R "$CEF_DIR/Release/"* ~/.suji/cef/${{ matrix.cef_platform }}/Release/ || true
          cp -R "$CEF_DIR/Resources/"* ~/.suji/cef/${{ matrix.cef_platform }}/Resources/ || true

      - name: Download CEF (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cefDir = "$env:USERPROFILE\.suji\cef\windows-x86_64"
          New-Item -ItemType Directory -Force -Path "$cefDir\Release"
          New-Item -ItemType Directory -Force -Path "$cefDir\Resources\locales"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.suji\cef\cache"
          $url = "https://cef-builds.spotifycdn.com/${{ matrix.cef_file }}"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\cef.tar.bz2"
          tar xjf "$env:TEMP\cef.tar.bz2" -C "$env:TEMP"
          $extracted = Get-ChildItem "$env:TEMP\cef_binary_*" -Directory | Select-Object -First 1
          Copy-Item -Recurse "$($extracted.FullName)\include" "$cefDir\" -Force
          Copy-Item "$($extracted.FullName)\Release\*" "$cefDir\Release\" -Force -ErrorAction SilentlyContinue
          Copy-Item "$($extracted.FullName)\Resources\*" "$cefDir\Resources\" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Download libnode (Unix)
        if: runner.os != 'Windows'
        run: |
          NODE_DIR="$HOME/.suji/node/${{ env.NODE_VERSION }}"
          mkdir -p "$NODE_DIR"
          ASSET="libnode-${{ env.NODE_VERSION }}-${{ matrix.node_platform }}.tar.gz"
          URL="https://github.com/ohah/suji/releases/download/libnode-v${{ env.NODE_VERSION }}/$ASSET"
          curl -fSL "$URL" -o /tmp/libnode.tar.gz 2>/dev/null && \
            tar xzf /tmp/libnode.tar.gz -C "$NODE_DIR" && \
            echo "libnode installed: $NODE_DIR" || \
            echo "libnode not available for ${{ matrix.node_platform }}, continuing without Node backend"

      - name: Download libnode (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = "$env:USERPROFILE\.suji\node\${{ env.NODE_VERSION }}"
          New-Item -ItemType Directory -Force -Path $nodeDir
          $asset = "libnode-${{ env.NODE_VERSION }}-${{ matrix.node_platform }}.tar.gz"
          $url = "https://github.com/ohah/suji/releases/download/libnode-v${{ env.NODE_VERSION }}/$asset"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\libnode.tar.gz"
            tar xzf "$env:TEMP\libnode.tar.gz" -C $nodeDir
            Write-Host "libnode installed: $nodeDir"
          } catch {
            Write-Host "libnode not available for ${{ matrix.node_platform }}, continuing without Node backend"
          }

      - name: Build suji
        run: zig build

      - name: Verify CEF runtime layout
        shell: bash
        run: |
          bin="zig-out/bin"
          if [ "$RUNNER_OS" = "Windows" ]; then
            test -f "$bin/suji.exe"
            test -f "$bin/libcef.dll"
          else
            test -x "$bin/suji"
            test -f "$bin/libcef.so"
          fi
          for file in \
            icudtl.dat \
            resources.pak \
            chrome_100_percent.pak \
            chrome_200_percent.pak \
            v8_context_snapshot.bin; do
            test -f "$bin/$file"
          done
          test -d "$bin/locales"

      - name: Install root e2e dependencies
        run: bun install

      - name: Install frontend dependencies
        working-directory: examples/multi-backend/frontend
        run: bun install

      - name: E2E — WebContentsView lifecycle (Linux)
        if: runner.os == 'Linux'
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          NO_AT_BRIDGE: "1"
          GDK_BACKEND: "x11"
          GTK_USE_PORTAL: "0"
          SUJI_CEF_CI: "1"
          SUJI_CEF_LOG: ${{ github.workspace }}/e2e-logs/cef-debug.log
          SUJI_LOG: ${{ github.workspace }}/e2e-logs/suji-e2e-view-lifecycle.log
        run: |
          mkdir -p e2e-logs
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"
          export LD_LIBRARY_PATH="$HOME/.suji/cef/linux-x86_64/Release:${LD_LIBRARY_PATH:-}"
          XDG_RUNTIME_DIR="$RUNNER_TEMP/xdg-runtime" \
            xvfb-run -a --server-args="-screen 0 1280x1024x24 -ac +extension GLX +render -noreset" \
            dbus-run-session -- bash tests/e2e/run-view-lifecycle.sh

      - name: E2E — WebContentsView lifecycle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          SUJI_CEF_CI: "1"
          SUJI_LOG: ${{ github.workspace }}/e2e-logs/suji-e2e-view-lifecycle.log
        run: |
          mkdir -p e2e-logs
          export SUJI_CEF_LOG="$(cygpath -w "$PWD/e2e-logs/cef-debug.log")"
          export PATH="$(cygpath -u "$USERPROFILE/.suji/cef/windows-x86_64/Release"):$PATH"
          bash tests/e2e/run-view-lifecycle.sh

      - name: Collect cross-platform suji logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p e2e-logs
          cp /tmp/suji-e2e-*.log e2e-logs/ 2>/dev/null || true
          cp "$RUNNER_TEMP"/suji-e2e-*.log e2e-logs/ 2>/dev/null || true
          cp "$HOME"/.suji/logs/suji-*.log e2e-logs/ 2>/dev/null || true
          cp zig-out/bin/debug.log e2e-logs/cef-default-debug.log 2>/dev/null || true
          if [ "$RUNNER_OS" = "Windows" ]; then
            npm_logs="$(cygpath -u "$LOCALAPPDATA/npm-cache/_logs" 2>/dev/null || true)"
            if [ -n "${npm_logs:-}" ]; then
              cp "$npm_logs"/*.log e2e-logs/ 2>/dev/null || true
            fi
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            app_debug="$(cygpath -u "$APPDATA/Multi Backend Example/Cache/debug.log" 2>/dev/null || true)"
          else
            app_debug="$HOME/.config/Multi Backend Example/Cache/debug.log"
          fi
          if [ -n "${app_debug:-}" ]; then
            cp "$app_debug" e2e-logs/debug.log 2>/dev/null || true
          fi
          find e2e-logs -maxdepth 2 -type f -print -exec tail -80 {} \; || true

      - name: Upload cross-platform suji logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: suji-webcontentsview-e2e-${{ runner.os }}-logs
          path: e2e-logs/**
          if-no-files-found: ignore
