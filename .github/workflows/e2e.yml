name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '24.14.1'
  # ci.yml кіј лҸҷмқј вҖ” specta-macros rc.25(edition2024+let-chains+
  # extract_if) лЎңм»¬ мӢӨмҰқм№ҳ 1.93.0.
  RUST_TOOLCHAIN: '1.93.0'
  GO_VERSION: '1.26.0'
  CEF_PLATFORM: 'macos-arm64'
  CEF_FILE: 'cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_macosarm64_minimal.tar.bz2'

jobs:
  e2e:
    # macOS only вҖ” Linux/WindowsлҠ” GUI runner л¶Җмһ¬ + frameless drag region л“ұ лҜём§Җмӣҗ.
    runs-on: macos-14
    # CI grace period вҖ” flaky н•ң лҸҷм•Ҳ л№Ңл“ң мһҗмІҙлҠ” нҶөкіјмӢңнӮҙ.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download CEF
        run: |
          mkdir -p ~/.suji/cef/${{ env.CEF_PLATFORM }}/Release
          mkdir -p ~/.suji/cef/${{ env.CEF_PLATFORM }}/Resources/locales
          mkdir -p ~/.suji/cef/cache
          curl -fSL "https://cef-builds.spotifycdn.com/${{ env.CEF_FILE }}" -o /tmp/cef.tar.bz2
          tar xjf /tmp/cef.tar.bz2 -C /tmp
          CEF_DIR=$(ls -d /tmp/cef_binary_* | head -1)
          cp -R "$CEF_DIR/include" ~/.suji/cef/${{ env.CEF_PLATFORM }}/
          cp -R "$CEF_DIR/Release/"* ~/.suji/cef/${{ env.CEF_PLATFORM }}/Release/ || true
          cp -R "$CEF_DIR/Resources/"* ~/.suji/cef/${{ env.CEF_PLATFORM }}/Resources/ || true

      - name: Download libnode
        run: |
          NODE_DIR="$HOME/.suji/node/${{ env.NODE_VERSION }}"
          mkdir -p "$NODE_DIR"
          ASSET="libnode-${{ env.NODE_VERSION }}-macos-arm64.tar.gz"
          URL="https://github.com/ohah/suji/releases/download/libnode-v${{ env.NODE_VERSION }}/$ASSET"
          curl -fSL "$URL" -o /tmp/libnode.tar.gz
          tar xzf /tmp/libnode.tar.gz -C "$NODE_DIR"
          # release tarм—җ libnode.dylibл§Ң мһҲкі  versioned symlink лҲ„лқҪ вҖ” suji л°”мқҙл„ҲлҰ¬лҠ”
          # @rpath/libnode.137.dylibмқ„ м°ҫмңјлҜҖлЎң install_name л§Өм№ӯмҡ© symlink мғқм„ұ.
          ln -sf libnode.dylib "$NODE_DIR/libnode.137.dylib"
          echo "libnode installed: $NODE_DIR"
          ls -la "$NODE_DIR" | head

      - name: Build suji
        run: zig build

      - name: Install root e2e dependencies (puppeteer-core)
        run: bun install

      - name: Install frontend dependencies
        working-directory: examples/multi-backend/frontend
        run: bun install

      # мІ« лӢЁкі„: к°ҖлІјмҡҙ fs e2eл§Ң. м•Ҳм •нҷ”лҗҳл©ҙ лҚ” м¶”к°Җ.
      - name: E2E вҖ” fs
        run: bash tests/e2e/run-fs.sh

      - name: E2E вҖ” global shortcut
        run: bash tests/e2e/run-global-shortcut.sh

      - name: E2E вҖ” window lifecycle events
        run: bash tests/e2e/run-window-lifecycle-events.sh

      - name: E2E вҖ” CEF Views window lifecycle/options
        run: bash tests/e2e/run-window-lifecycle-cef-views.sh

      - name: E2E вҖ” CEF Views window lifecycle events
        run: bash tests/e2e/run-window-lifecycle-events-cef-views.sh

      - name: E2E вҖ” CEF Views WebContentsView lifecycle
        run: bash tests/e2e/run-view-lifecycle-cef-views.sh

      - name: Upload suji logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: suji-e2e-logs
          path: /tmp/suji-e2e-*.log
          if-no-files-found: ignore
