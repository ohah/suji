name: sdk-publish

# SDK 배포 워크플로. 기본(workflow_dispatch, dry_run=true)은 pack /
# --dry-run / build·vet 검증만 — 실제 발행 안 함. 실제 발행은
# `sdk-vX.Y.Z` 태그 푸시 또는 dry_run=false + 레지스트리 토큰 시크릿
# 보유 시에만(토큰 없으면 자동 skip). app 릴리스(release.yml, v* 태그)
# 와 태그 네임스페이스 분리(sdk-v*).
on:
  push:
    tags: ['sdk-v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: '검증만 (실제 npm/crates 발행 생략)'
        type: boolean
        default: true

permissions:
  contents: read

env:
  NODE_VERSION: '24.14.1'
  # specta-macros rc.25(edition2024+let-chains) 때문에 1.93.0 (ci.yml 동일).
  RUST_TOOLCHAIN: '1.93.0'
  GO_VERSION: '1.26.0'

jobs:
  npm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: packages/suji-js
            pkg: '@suji/api'
          - dir: packages/suji-node
            pkg: '@suji/node'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install + build
        working-directory: ${{ matrix.dir }}
        run: |
          npm ci
          npm run build --if-present
      - name: Pack + publish --dry-run (항상 — packability 검증)
        working-directory: ${{ matrix.dir }}
        run: |
          npm pack --dry-run
          npm publish --dry-run --access public
      - name: Publish to npm
        # sdk 태그 푸시 또는 명시적 dry_run=false 일 때만. 토큰 없으면 skip.
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        working-directory: ${{ matrix.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN 미설정 — ${{ matrix.pkg }} 발행 skip"
            exit 0
          fi
          npm publish --access public

  crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      # 발행 순서: suji-macros(leaf) → suji. suji 의 path dep 가 발행 시
      # registry 버전으로 해소되므로, suji-macros 가 crates.io 에 없으면
      # suji 의 publish --dry-run 은 'no matching package' 로 불가
      # (워크스페이스 본질). 따라서 검증은 macros=dry-run, suji=cargo check.
      - name: 검증 (suji-macros dry-run + suji compile)
        run: |
          cargo publish --dry-run --allow-dirty --manifest-path crates/suji-rs-macros/Cargo.toml
          cargo check --manifest-path crates/suji-rs/Cargo.toml
      - name: "Publish to crates.io (순서: macros → suji)"
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN 미설정 — crate 발행 skip"
            exit 0
          fi
          # ⚠ crates.io 는 재발행 불가(yank 만 가능). macros 발행 후 아래
          # 단계가 실패하면 부분 발행 상태가 되어 수동 복구(버전 bump) 필요.
          cargo publish --manifest-path crates/suji-rs-macros/Cargo.toml
          # macros 인덱스 반영 대기 — sparse index 직접 조회(cargo search 는
          # 검색 API 라 rate-limit/지연 불안정). bounded 재시도(30회×10s=5분)
          # 후 미반영이면 명시적 실패(무한 대기 방지).
          for i in $(seq 1 30); do
            curl -fsS "https://index.crates.io/su/ji/suji-macros" >/dev/null 2>&1 && break
            [ "$i" -eq 30 ] && { echo "::error::suji-macros 인덱스 5분 내 미반영 — suji 발행 중단(부분 발행: macros 수동 확인)"; exit 1; }
            sleep 10
          done
          cargo publish --manifest-path crates/suji-rs/Cargo.toml

  go:
    # Go 모듈은 레지스트리 발행이 없음 — VCS 태그로 소비(go get
    # github.com/ohah/suji-go@<tag>). 여기선 빌드/vet 검증만 하고 태깅은
    # 수동(docs/RELEASING.md). cgo bridge.c 때문에 CC 필요.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build + vet (검증)
        working-directory: sdks/suji-go
        run: |
          go build ./...   # 컴파일 = 발행 게이트(go 모듈은 VCS 태그 소비)
          # vet 은 cgo 핸들(unsafe.Pointer(uintptr(id)) — C void* userdata)
          # 을 misuse 로 오탐. 발행 비차단이라 경고로만.
          go vet ./... || echo "::warning::go vet 경고(기존 cgo unsafe.Pointer 핸들 패턴) — 발행 비차단"
          echo "Go SDK 검증 OK — 발행은 'sdk-vX.Y.Z' 태그로 (go get @태그)"
