name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '24.14.1'
  # specta-macros 2.0.0-rc.25 는 edition2024 + let-chains(1.88) +
  # extract_if(1.87) 사용 → 1.85 로 부족. 로컬 실증치 1.93.0 으로 핀.
  RUST_TOOLCHAIN: '1.93.0'
  GO_VERSION: '1.26.0'

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            cef_platform: macos-arm64
            cef_file: "cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_macosarm64_minimal.tar.bz2"
            node_platform: macos-arm64
          - os: ubuntu-24.04
            cef_platform: linux-x86_64
            cef_file: "cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_linux64_minimal.tar.bz2"
            node_platform: linux-x86_64
          - os: windows-latest
            cef_platform: windows-x86_64
            cef_file: "cef_binary_146.0.9%2Bg3ca6a87%2Bchromium-146.0.7680.165_windows64_minimal.tar.bz2"
            node_platform: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev libxss-dev libsecret-1-dev libnss3 libatk-bridge2.0-0 libdrm2 libgbm1

      - name: Download CEF (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.suji/cef/${{ matrix.cef_platform }}/Release
          mkdir -p ~/.suji/cef/${{ matrix.cef_platform }}/Resources/locales
          mkdir -p ~/.suji/cef/cache
          curl -fSL "https://cef-builds.spotifycdn.com/${{ matrix.cef_file }}" -o /tmp/cef.tar.bz2
          tar xjf /tmp/cef.tar.bz2 -C /tmp
          CEF_DIR=$(ls -d /tmp/cef_binary_* | head -1)
          cp -R "$CEF_DIR/include" ~/.suji/cef/${{ matrix.cef_platform }}/
          cp -R "$CEF_DIR/Release/"* ~/.suji/cef/${{ matrix.cef_platform }}/Release/ || true
          cp -R "$CEF_DIR/Resources/"* ~/.suji/cef/${{ matrix.cef_platform }}/Resources/ || true

      - name: Download CEF (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cefDir = "$env:USERPROFILE\.suji\cef\windows-x86_64"
          New-Item -ItemType Directory -Force -Path "$cefDir\Release"
          New-Item -ItemType Directory -Force -Path "$cefDir\Resources\locales"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.suji\cef\cache"
          $url = "https://cef-builds.spotifycdn.com/${{ matrix.cef_file }}"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\cef.tar.bz2"
          tar xjf "$env:TEMP\cef.tar.bz2" -C "$env:TEMP"
          $extracted = Get-ChildItem "$env:TEMP\cef_binary_*" -Directory | Select-Object -First 1
          Copy-Item -Recurse "$($extracted.FullName)\include" "$cefDir\" -Force
          Copy-Item "$($extracted.FullName)\Release\*" "$cefDir\Release\" -Force -ErrorAction SilentlyContinue
          Copy-Item "$($extracted.FullName)\Resources\*" "$cefDir\Resources\" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Download libnode (Unix)
        if: runner.os != 'Windows'
        run: |
          NODE_DIR="$HOME/.suji/node/${{ env.NODE_VERSION }}"
          mkdir -p "$NODE_DIR"
          ASSET="libnode-${{ env.NODE_VERSION }}-${{ matrix.node_platform }}.tar.gz"
          URL="https://github.com/ohah/suji/releases/download/libnode-v${{ env.NODE_VERSION }}/$ASSET"
          curl -fSL "$URL" -o /tmp/libnode.tar.gz 2>/dev/null && \
            tar xzf /tmp/libnode.tar.gz -C "$NODE_DIR" && \
            echo "libnode installed: $NODE_DIR" || \
            echo "libnode not available for ${{ matrix.node_platform }}, skipping Node backend"

      - name: Download libnode (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = "$env:USERPROFILE\.suji\node\${{ env.NODE_VERSION }}"
          New-Item -ItemType Directory -Force -Path $nodeDir
          $asset = "libnode-${{ env.NODE_VERSION }}-${{ matrix.node_platform }}.tar.gz"
          $url = "https://github.com/ohah/suji/releases/download/libnode-v${{ env.NODE_VERSION }}/$asset"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\libnode.tar.gz"
            tar xzf "$env:TEMP\libnode.tar.gz" -C $nodeDir
            Write-Host "libnode installed: $nodeDir"
          } catch {
            Write-Host "libnode not available for ${{ matrix.node_platform }}, skipping"
          }

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Test Rust SDK
        run: cargo test --manifest-path crates/suji-rs/Cargo.toml

      - name: Build state plugin
        working-directory: plugins/state/zig
        run: zig build

      - name: Test state plugin
        run: zig build test-state

      - name: Test state plugin Rust wrapper
        run: zig build test-state-rust

      - name: Test state plugin Go wrapper
        run: zig build test-state-go

  # CEF 무관 임베드 코어 라이브러리 회귀 방지.
  # CEF/Node/Rust/Go 불필요 — 경계가 데스크톱 의존을 다시 끌어오거나
  # 모바일 크로스 컴파일이 깨지면 여기서 잡힌다. macOS 러너(Xcode SDK)에서
  # host + iOS/Android/Windows 타깃을 전부 빌드.
  embed-lib:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build embed lib (host macOS)
        run: zig build lib

      - name: Cross-compile embed lib (iOS aarch64)
        run: zig build lib -Dtarget=aarch64-ios

      # iOS 산출물이 아직 zig-out/lib 에 있을 때 검증 (이후 타깃이 덮어씀).
      - name: Verify C ABI symbols exported
        run: |
          for sym in init destroy invoke free emit emit_to on off; do
            nm zig-out/lib/libsuji_core.a 2>/dev/null | grep -q "T _suji_core_$sym" \
              || { echo "missing export: suji_core_$sym"; exit 1; }
          done
          echo "all suji_core_* symbols present"

      - name: Cross-compile embed lib (Android aarch64)
        run: zig build lib -Dtarget=aarch64-linux-android

      - name: Cross-compile embed lib (Windows x86_64)
        run: zig build lib -Dtarget=x86_64-windows

      # 외부 프로젝트가 b.dependency("suji").module("suji") 로 소비 가능한지
      # 회귀 가드 (PLAN 배포 — Zig 패키지 시나리오).
      - name: Zig package consumability
        run: bash tests/zig-consumer/run.sh

  # 모바일 정적 백엔드 메커니즘 회귀 방지 (CEF/NDK/Xcode 불필요 — 호스트
  # 타깃으로 코어+Rust+Go 정적 링크 후 register_handler 왕복 실증).
  mobile-backends:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run mobile-backends host harness
        run: bash tests/mobile-backends/run.sh
