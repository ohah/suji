<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Suji iOS</title>
  <style>
    body { font: 16px -apple-system, system-ui; padding: 2rem; color: #111; }
    h1 { font-size: 1.4rem; letter-spacing: .02em; }
    .row { margin: .8rem 0; }
    code { background: #f2f2f7; padding: .15rem .4rem; border-radius: 4px; }
    #ticks { font-variant-numeric: tabular-nums; color: #0a7; }
  </style>
</head>
<body>
  <h1>Suji iOS 호스트</h1>
  <p>WKWebView ↔ <code>libsuji_core.a</code> C ABI 왕복 데모.</p>

  <div class="row">
    <button id="ping">ping (Swift)</button>
    <button id="inc">counter:inc (Swift)</button>
    <button id="greet">greet (Rust)</button>
    <button id="add">add (Rust)</button>
    <button id="goping">go:ping (Go)</button>
    <button id="goupper">go:upper (Go)</button>
  </div>
  <div class="row">응답: <strong id="out">…</strong></div>
  <div class="row">네이티브 → JS 이벤트 (<code>demo:tick</code>):
    <span id="ticks">대기 중…</span>
  </div>

  <script>
    var out = document.getElementById("out");
    // suji.invoke → suji_core_register_handler 로 등록된 Swift 핸들러가 응답.
    document.getElementById("ping").onclick = function () {
      suji.invoke("ping", { from: "ios" }).then(function (r) {
        out.textContent = "ping → " + JSON.stringify(r);
      });
    };
    document.getElementById("inc").onclick = function () {
      suji.invoke("counter:inc").then(function (r) {
        out.textContent = "counter → " + JSON.stringify(r);
      });
    };
    // Rust/Go 정적 백엔드 (suji_core_register_handler 로 등록).
    function call(id, ch, payload) {
      document.getElementById(id).onclick = function () {
        suji.invoke(ch, payload).then(function (r) {
          out.textContent = ch + " → " + JSON.stringify(r);
        });
      };
    }
    call("greet", "greet", { name: "Suji" });
    call("add", "add", { a: 19, b: 23 });
    call("goping", "go:ping", {});
    call("goupper", "go:upper", { s: "hello ios" });

    // suji.on: 호스트가 2초마다 suji_core_emit 으로 발행하는 틱 수신.
    var n = 0;
    suji.on("demo:tick", function (d) {
      n++;
      document.getElementById("ticks").textContent =
        "tick #" + n + "  payload=" + JSON.stringify(d);
    });
  </script>
</body>
</html>
