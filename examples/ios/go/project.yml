name: SujiIOSGo

options:
  bundleIdPrefix: dev.suji.examples
  deploymentTarget:
    iOS: "15.0"

targets:
  SujiIOSGo:
    type: application
    platform: iOS
    sources:
      - path: ../_shared
        excludes: [Info.plist]
      - path: Backends.swift
      - path: web
    settings:
      base:
        # xcodegen 이 공유 Info.plist 를 덮어쓰지 않도록 생성 대신 참조
        INFOPLIST_FILE: $(SRCROOT)/../_shared/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/../_shared/Suji-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../../../include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        OTHER_LDFLAGS:
          - -lsuji_core
          - -lsuji_go_backend
          - -lresolv
    dependencies:
      - sdk: CoreFoundation.framework
      - sdk: Security.framework
