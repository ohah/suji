name: SujiIOSRust

options:
  bundleIdPrefix: dev.suji.examples
  deploymentTarget:
    iOS: "15.0"

targets:
  SujiIOSRust:
    type: application
    platform: iOS
    sources:
      - path: ../_shared      # 공유 호스트
        excludes: [Info.plist]
      - path: Backends.swift  # Rust 만 등록
      - path: web
    settings:
      base:
        # 배포 서명 — env SUJI_IOS_TEAM_ID 주입 시 자동 서명(미설정이면 빈
        # 값 → 미서명 로컬은 archive-ios.sh 의 CODE_SIGNING_ALLOWED=NO).
        DEVELOPMENT_TEAM: ${SUJI_IOS_TEAM_ID}
        CODE_SIGN_STYLE: Automatic
        # xcodegen 이 공유 Info.plist 를 덮어쓰지 않도록 생성 대신 참조
        INFOPLIST_FILE: $(SRCROOT)/../_shared/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/../_shared/Suji-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../../../include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        OTHER_LDFLAGS:
          - -lsuji_core
          - -lsuji_rs_backend
    # Go 미링크 → CoreFoundation/Security/-lresolv 불필요
