name: SujiIOSMulti

options:
  bundleIdPrefix: dev.suji.examples
  deploymentTarget:
    iOS: "15.0"

targets:
  SujiIOSMulti:
    type: application
    platform: iOS
    sources:
      - path: ../_shared      # 공유 호스트(AppDelegate/VC/bridging/Info)
      - path: Backends.swift  # 변형별 백엔드 등록 (Rust+Go)
      - path: web             # 번들 프론트엔드
    info:
      path: ../_shared/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/../_shared/Suji-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/../../../include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor
        OTHER_LDFLAGS:
          - -lsuji_core
          - -lsuji_rs_backend
          - -lsuji_go_backend
          - -lresolv
    dependencies:
      - sdk: CoreFoundation.framework
      - sdk: Security.framework
