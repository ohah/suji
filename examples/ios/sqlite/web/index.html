<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Suji iOS · SQLite</title>
  <style>
    body { font: 16px -apple-system, system-ui; padding: 2rem; color: #111; }
    h1 { font-size: 1.4rem; letter-spacing: .02em; }
    .row { margin: .8rem 0; }
    input { font: inherit; padding: .35rem .5rem; border: 1px solid #ccc; border-radius: 6px; }
    button { font: inherit; padding: .35rem .7rem; }
    code { background: #f2f2f7; padding: .15rem .4rem; border-radius: 4px; }
    pre { background: #f2f2f7; padding: .8rem; border-radius: 8px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Suji iOS · SQLite 백엔드</h1>
  <p>WKWebView ↔ 정적 링크 <code>libsuji_sqlite_backend.a</code> (벤더 SQLite 3.51,
     데스크탑 <code>plugins/sqlite</code> 와 바이트 동형 응답).</p>

  <div class="row">
    <input id="todo" placeholder="할 일 입력" />
    <button id="add">추가 (INSERT)</button>
    <button id="list">목록 (SELECT)</button>
  </div>
  <div class="row">상태: <strong id="status">DB 준비 중…</strong></div>
  <pre id="rows">[]</pre>

  <script>
    var dbId = null;
    var statusEl = document.getElementById("status");
    var rowsEl = document.getElementById("rows");

    // 백엔드 응답은 데스크탑 plugins/sqlite 와 바이트 동형
    // (`{from:"zig",result:..}` / `{from:"zig",error:..}`). 어떤 브리지도
    // result 를 언래핑하지 않으므로 plugins/sqlite/js 래퍼와 동일하게
    // 여기서 언래핑 + 에러 throw.
    async function sql(cmd, extra) {
      var r = await suji.invoke(cmd, extra || {});
      if (r && r.error) throw new Error(r.error);
      return r && r.result !== undefined ? r.result : r;
    }

    async function refresh() {
      var r = await sql("sql:query", {
        dbId: dbId, sql: "SELECT id, text FROM todo ORDER BY id"
      });
      rowsEl.textContent = JSON.stringify(r.rows || [], null, 1);
    }

    async function init() {
      try {
        var o = await sql("sql:open", { path: ":memory:" });
        dbId = o.dbId;
        await sql("sql:execute", {
          dbId: dbId,
          sql: "CREATE TABLE todo(id INTEGER PRIMARY KEY, text TEXT)"
        });
        statusEl.textContent = "dbId=" + dbId + " (메모리 DB, todo 테이블 생성)";
        await refresh();
      } catch (e) {
        statusEl.textContent = "init 실패: " + e;
      }
    }

    document.getElementById("add").onclick = async function () {
      var v = document.getElementById("todo").value.trim();
      if (!v || dbId == null) return;
      // positional `?` 파라미터 — SQL injection-safe.
      var r = await sql("sql:execute", {
        dbId: dbId, sql: "INSERT INTO todo(text) VALUES (?)", params: [v]
      });
      statusEl.textContent = "INSERT → rowid " + r.lastInsertRowid;
      document.getElementById("todo").value = "";
      await refresh();
    };
    document.getElementById("list").onclick = refresh;

    init();
  </script>
</body>
</html>
