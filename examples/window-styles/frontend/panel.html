<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Frameless Panel</title>
  <style>
    /* frameless 창 — OS 타이틀바 없음. drag region을 직접 지정. */
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; }
    body { background: #1d1d1f; color: #f5f5f7; display: flex; flex-direction: column; }

    /* 드래그 가능한 커스텀 타이틀바.
       -webkit-app-region: drag → 이 영역 마우스 down으로 창 이동.
       Chromium/CEF 표준 동작 (Electron/Tauri와 동일). */
    .titlebar {
      -webkit-app-region: drag;
      app-region: drag;
      display: flex; align-items: center; justify-content: space-between;
      height: 32px; padding: 0 8px;
      background: #2c2c2e;
      border-bottom: 1px solid #3a3a3c;
    }
    .title { font-size: 12px; font-weight: 600; padding-left: 4px; }
    .controls { display: flex; gap: 4px; }

    /* 버튼은 drag 영역 안에 있어도 클릭 가능해야 — no-drag로 빼냄. */
    .controls button {
      -webkit-app-region: no-drag;
      app-region: no-drag;
      width: 24px; height: 22px; border: none; border-radius: 3px;
      background: #3a3a3c; color: #f5f5f7; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #48484a; }

    .body { flex: 1; padding: 16px; overflow: auto; }
    .body p { margin: 0 0 12px; line-height: 1.4; font-size: 12px; color: #a1a1a6; }
    .body code { background: #2c2c2e; padding: 2px 5px; border-radius: 3px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="title">⌘ Frameless Panel</div>
    <div class="controls">
      <button id="quit" title="앱 종료">✕</button>
    </div>
  </div>

  <div class="body">
    <p><strong>frame: false</strong> + 커스텀 타이틀바.</p>
    <p>타이틀바 영역을 드래그해 창을 옮길 수 있습니다.</p>
    <p>핵심 CSS:</p>
    <p><code>-webkit-app-region: drag</code> → 드래그 영역.<br/>
    <code>-webkit-app-region: no-drag</code> → 클릭 가능 (drag 영역 안의 버튼).</p>
  </div>

  <script type="module">
    document.getElementById('quit').addEventListener('click', () => {
      window.__suji__.quit();
    });
  </script>
</body>
</html>
