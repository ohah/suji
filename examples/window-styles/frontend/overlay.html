<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Transparent HUD</title>
  <style>
    /* transparent 창 — body 자체도 투명해야 OS 윈도우까지 비침. */
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: transparent;
      -webkit-user-select: none;
      font-family: -apple-system, sans-serif;
    }

    /* HUD 컨테이너 — 둥근 사각형 + 반투명 어두운 배경. */
    .hud {
      -webkit-app-region: drag;
      app-region: drag;
      box-sizing: border-box;
      width: 100%; height: 100%;
      padding: 14px 18px;
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 14px;
      color: white;
      display: flex; flex-direction: column; justify-content: center;
    }
    .label { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    #message { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="hud">
    <div class="label">Transparent HUD · child of main</div>
    <div id="message">메인 창의 "broadcast" 버튼을 눌러보세요</div>
  </div>

  <script type="module">
    // 메인 창에서 hud-toast 호출 → suji.send('hud:toast', {text}) → 모든 창에 broadcast.
    // HUD만 'hud:toast'를 구독해서 표시.
    const msg = document.getElementById('message');
    window.__suji__.on('hud:toast', (data) => {
      const obj = typeof data === 'string' ? JSON.parse(data) : data;
      msg.textContent = obj.text || '(empty)';
    });
  </script>
</body>
</html>
