<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suji Android · SQLite</title>
  <style>
    body { font: 16px system-ui, sans-serif; padding: 2rem; color: #111; }
    h1 { font-size: 1.4rem; }
    .row { margin: .8rem 0; }
    code { background: #eee; padding: .15rem .4rem; border-radius: 4px; }
    #ticks { font-variant-numeric: tabular-nums; color: #0a7; }
  </style>
  <script>
    // 브리지 shim — 인라인 최상단이라 아래 앱 스크립트보다 먼저 실행됨.
    // window.SujiNative 는 addJavascriptInterface 로 페이지 로드 시 주입됨.
    (function () {
      var _id = 0, _pending = {}, _listeners = {};
      function invoke(channel, payload) {
        return new Promise(function (res) {
          var id = ++_id; _pending[id] = res;
          window.SujiNative.invoke(id, String(channel),
            JSON.stringify(payload === undefined ? {} : payload));
        });
      }
      // coreCall(@suji/api) 전용 — 이미 stringify 된 문자열을 그대로(재인코딩
      // 금지) __core__ 채널로. 데스크톱 __suji__.core 계약과 동형.
      function core(json) {
        return new Promise(function (res) {
          var id = ++_id; _pending[id] = res;
          window.SujiNative.invoke(id, "__core__",
            (typeof json === "string" ? json : JSON.stringify(json)));
        });
      }
      function __resolve__(id, json) {
        var r = _pending[id]; if (!r) return; delete _pending[id];
        try { r(json ? JSON.parse(json) : null); } catch (e) { r(json); }
      }
      function on(name, cb) { (_listeners[name] = _listeners[name] || []).push(cb); }
      function __emit__(name, json) {
        var ls = _listeners[name]; if (!ls) return;
        var d; try { d = json ? JSON.parse(json) : null; } catch (e) { d = json; }
        ls.forEach(function (f) { try { f(d); } catch (e) {} });
      }
      var api = { invoke: invoke, core: core, on: on, __resolve__: __resolve__, __emit__: __emit__ };
      window.__suji__ = api; window.suji = api;
    })();
  </script>
</head>
<body>
  <h1>Suji Android · SQLite 백엔드</h1>
  <p>WebView ↔ JNI ↔ 정적 <code>libsuji_sqlite_backend.a</code> (벤더 SQLite
     3.51, 데스크탑 <code>plugins/sqlite</code> 와 바이트 동형 응답).</p>

  <div class="row">
    <input id="todo" placeholder="할 일 입력" />
    <button id="add">추가 (INSERT)</button>
    <button id="list">목록 (SELECT)</button>
  </div>
  <div class="row">상태: <strong id="status">DB 준비 중…</strong></div>
  <pre id="rows" style="background:#eee;padding:.8rem;border-radius:8px;overflow:auto">[]</pre>

  <script>
    var dbId = null;
    var statusEl = document.getElementById("status");
    var rowsEl = document.getElementById("rows");

    // 백엔드 응답은 데스크탑 plugins/sqlite 와 바이트 동형
    // (`{from:"zig",result:..}` / `{from:"zig",error:..}`). 어떤 브리지도
    // result 를 언래핑하지 않으므로 plugins/sqlite/js 래퍼와 동일하게
    // 여기서 언래핑 + 에러 throw.
    async function sql(cmd, extra) {
      var r = await suji.invoke(cmd, extra || {});
      if (r && r.error) throw new Error(r.error);
      return r && r.result !== undefined ? r.result : r;
    }

    async function refresh() {
      var r = await sql("sql:query", {
        dbId: dbId, sql: "SELECT id, text FROM todo ORDER BY id"
      });
      rowsEl.textContent = JSON.stringify(r.rows || [], null, 1);
    }

    async function init() {
      try {
        var o = await sql("sql:open", { path: ":memory:" });
        dbId = o.dbId;
        await sql("sql:execute", {
          dbId: dbId,
          sql: "CREATE TABLE todo(id INTEGER PRIMARY KEY, text TEXT)"
        });
        statusEl.textContent = "dbId=" + dbId + " (메모리 DB, todo 테이블 생성)";
        await refresh();
      } catch (e) {
        statusEl.textContent = "init 실패: " + e;
      }
    }

    document.getElementById("add").onclick = async function () {
      var v = document.getElementById("todo").value.trim();
      if (!v || dbId == null) return;
      // positional `?` 파라미터 — SQL injection-safe.
      var r = await sql("sql:execute", {
        dbId: dbId, sql: "INSERT INTO todo(text) VALUES (?)", params: [v]
      });
      statusEl.textContent = "INSERT → rowid " + r.lastInsertRowid;
      document.getElementById("todo").value = "";
      await refresh();
    };
    document.getElementById("list").onclick = refresh;

    init();
  </script>
</body>
</html>
