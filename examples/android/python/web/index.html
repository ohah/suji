<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suji Android · Python</title>
  <style>
    body { font: 16px system-ui, sans-serif; padding: 2rem; color: #111; }
    h1 { font-size: 1.4rem; }
    code { background: #eee; padding: .15rem .4rem; border-radius: 4px; }
    pre { background: #f4f4f4; padding: .8rem; border-radius: 6px; }
  </style>
  <script>
    // 브리지 shim — 인라인 최상단(앱 스크립트보다 먼저). window.SujiNative 는
    // addJavascriptInterface 로 주입. examples/android/*/web/index.html 데모
    // 브리지와 동형(lockstep).
    (function () {
      var _id = 0, _pending = {}, _listeners = {};
      function invoke(channel, payload) {
        return new Promise(function (res) {
          var id = ++_id; _pending[id] = res;
          window.SujiNative.invoke(id, String(channel),
            JSON.stringify(payload === undefined ? {} : payload));
        });
      }
      function core(json) {
        return new Promise(function (res) {
          var id = ++_id; _pending[id] = res;
          window.SujiNative.invoke(id, "__core__",
            (typeof json === "string" ? json : JSON.stringify(json)));
        });
      }
      function __resolve__(id, json) {
        var r = _pending[id]; if (!r) return; delete _pending[id];
        try { r(json ? JSON.parse(json) : null); } catch (e) { r(json); }
      }
      function on(name, cb) { (_listeners[name] = _listeners[name] || []).push(cb); }
      function __emit__(name, json) {
        var ls = _listeners[name]; if (!ls) return;
        var d; try { d = json ? JSON.parse(json) : null; } catch (e) { d = json; }
        ls.forEach(function (f) { try { f(d); } catch (e) {} });
      }
      var api = { invoke: invoke, core: core, on: on, __resolve__: __resolve__, __emit__: __emit__ };
      window.__suji__ = api; window.suji = api;
    })();
  </script>
</head>
<body>
  <h1>Suji Android · embedded CPython</h1>
  <p>WebView ↔ JNI ↔ <code>libpython3.13.so</code> 왕복 데모.</p>
  <button id="ping">ping</button>
  <button id="echo">echo</button>
  <pre id="out">tap a button…</pre>
  <script>
    const out = document.getElementById("out");
    function show(label, v) { out.textContent = label + " → " + JSON.stringify(v, null, 1); }
    document.getElementById("ping").onclick = async () => show("ping", await window.__suji__.invoke("ping"));
    document.getElementById("echo").onclick = async () =>
      show("echo", await window.__suji__.invoke("echo", { value: "from-android", n: 42 }));
  </script>
</body>
</html>
