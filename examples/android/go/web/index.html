<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suji Android · Go</title>
  <style>
    body { font: 16px system-ui, sans-serif; padding: 2rem; color: #111; }
    h1 { font-size: 1.4rem; }
    .row { margin: .8rem 0; }
    code { background: #eee; padding: .15rem .4rem; border-radius: 4px; }
    #ticks { font-variant-numeric: tabular-nums; color: #0a7; }
  </style>
  <script>
    // 브리지 shim — 인라인 최상단이라 아래 앱 스크립트보다 먼저 실행됨.
    // window.SujiNative 는 addJavascriptInterface 로 페이지 로드 시 주입됨.
    (function () {
      var _id = 0, _pending = {}, _listeners = {};
      function invoke(channel, payload) {
        return new Promise(function (res) {
          var id = ++_id; _pending[id] = res;
          window.SujiNative.invoke(id, String(channel),
            JSON.stringify(payload === undefined ? {} : payload));
        });
      }
      // coreCall(@suji/api) 전용 — 이미 stringify 된 문자열을 그대로(재인코딩
      // 금지) __core__ 채널로. 데스크톱 __suji__.core 계약과 동형.
      function core(json) {
        return new Promise(function (res) {
          var id = ++_id; _pending[id] = res;
          window.SujiNative.invoke(id, "__core__",
            (typeof json === "string" ? json : JSON.stringify(json)));
        });
      }
      function __resolve__(id, json) {
        var r = _pending[id]; if (!r) return; delete _pending[id];
        try { r(json ? JSON.parse(json) : null); } catch (e) { r(json); }
      }
      function on(name, cb) { (_listeners[name] = _listeners[name] || []).push(cb); }
      function __emit__(name, json) {
        var ls = _listeners[name]; if (!ls) return;
        var d; try { d = json ? JSON.parse(json) : null; } catch (e) { d = json; }
        ls.forEach(function (f) { try { f(d); } catch (e) {} });
      }
      var api = { invoke: invoke, core: core, on: on, __resolve__: __resolve__, __emit__: __emit__ };
      window.__suji__ = api; window.suji = api;
    })();
  </script>
</head>
<body>
  <h1>Suji Android · Go 백엔드</h1>
  <p>WebView ↔ JNI ↔ <code>libsuji_core.a</code> 왕복 데모.</p>

  <div class="row">
    <button id="ping">ping (Kotlin)</button>
    <button id="inc">counter:inc (Kotlin)</button>
    <button id="goping">go:ping (Go)</button>
    <button id="goupper">go:upper (Go)</button>
  </div>
  <div class="row">응답: <strong id="out">…</strong></div>
  <div class="row">네이티브 → JS 이벤트 (<code>demo:tick</code>):
    <span id="ticks">대기 중…</span>
  </div>

  <script>
    var out = document.getElementById("out");
    // suji.invoke → suji_core_register_handler 로 등록된 Kotlin 핸들러가 응답.
    document.getElementById("ping").onclick = function () {
      suji.invoke("ping", { from: "android" }).then(function (r) {
        out.textContent = "ping → " + JSON.stringify(r);
      });
    };
    document.getElementById("inc").onclick = function () {
      suji.invoke("counter:inc").then(function (r) {
        out.textContent = "counter → " + JSON.stringify(r);
      });
    };
    // 정적 링크 Rust/Go 백엔드 (nativeRegisterStaticBackends).
    function call(id, ch, payload) {
      document.getElementById(id).onclick = function () {
        suji.invoke(ch, payload).then(function (r) {
          out.textContent = ch + " → " + JSON.stringify(r);
        });
      };
    }
    call("goping", "go:ping", {});
    call("goupper", "go:upper", { s: "hello android" });
    var n = 0;
    suji.on("demo:tick", function (d) {
      n++;
      document.getElementById("ticks").textContent =
        "tick #" + n + "  payload=" + JSON.stringify(d);
    });
  </script>
</body>
</html>
