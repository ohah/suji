<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suji App</title>
  </head>
  <body>
    <main
      style="max-width: 560px; margin: 0 auto; padding: 32px; font-family: system-ui, sans-serif"
    >
      <h1>Suji + Vanilla</h1>
      <p style="color: #888"><code>import { invoke } from "./suji"</code></p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px">
        <button id="ping">invoke("ping")</button>
        <input id="name" value="Suji" aria-label="name" />
        <button id="greet">invoke("greet", { name })</button>
      </div>
      <pre
        id="log"
        style="margin-top: 24px; padding: 14px; background: #111; color: #0f0; border-radius: 6px; white-space: pre-wrap"
      >
Ready. 백엔드 핸들러를 호출해 보세요.</pre
      >
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
